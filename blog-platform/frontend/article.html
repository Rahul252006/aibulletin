<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report - The AI Bulletin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = {
  theme: {
    extend: {
      colors: {
        gray: {
          950: '#020202',
          900: '#070707',
          850: '#0a0a0a',
          800: '#101010',
          750: '#151515',
          700: '#181818',
          600: '#222222',
          500: '#444444',
          400: '#8c8c8c',
          300: '#c8c8c8',
          200: '#e1e1e1',
          100: '#f5f5f5'
        }
      },
      fontFamily: {
        sans: ['Inter', 'sans-serif'],
        serif: ['Outfit', 'sans-serif']
      }
    }
  }
}</script>
  <link rel="stylesheet" href="style.css">
  <style>
    .prose { max-width: none; }
    .prose p { font-family: 'Inter', sans-serif; color: #f3f4f6; line-height: 1.9; margin-bottom: 1.6em; font-size: 1.15rem; }
    .prose h2 { font-family: 'Outfit', sans-serif; font-weight: 900; color: #fff; font-size: 1.75rem; margin-top: 2.2em; margin-bottom: 0.8em; border-left: 4px solid #f97316; padding-left: 1rem; }
    .prose h3 { font-family: 'Outfit', sans-serif; font-weight: 900; color: #fff; font-size: 1.35rem; margin-top: 1.8em; margin-bottom: 0.6em; }
    .prose a { color: #ffffff; text-decoration: underline; font-weight: 700; }
    .prose a:hover { color: #d1d5db; }
    .prose ul, .prose ol { margin-bottom: 1.6em; padding-left: 1.5em; font-family: 'Inter', sans-serif; font-size: 1.1rem; line-height: 1.8; }
    .prose li { margin-bottom: 0.6em; color: #d1d5db; }
    .prose blockquote { border-left: 4px solid #f97316; margin: 2em 0; padding: 1em 1.5em; background: #070707; font-style: italic; }
    .prose blockquote p { margin-bottom: 0; font-size: 1.2rem; }
    .prose strong { font-weight: 800; color: #fff; }
    .tag-pill { background: #f97316; color: #000; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 2px 8px; display: inline-block; border-radius: 0.25rem; }
    .sidebar-card { transition: transform 0.2s ease; }
    .sidebar-card:hover { transform: translateX(3px); }
    .fade-up { animation: fadeUp 0.6s ease forwards; opacity: 0; }
    @keyframes fadeUp { to { opacity:1; transform:translateY(0); } from { opacity:0; transform:translateY(16px); } }
  </style>
</head>
<body class="bg-black text-gray-100 font-sans antialiased pt-16">

  <nav class="fixed w-full top-0 left-0 z-50 bg-black/70 backdrop-blur-xl border-b border-neutral-900 shadow-xl shadow-black/40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center gap-6">
        <div class="flex items-center gap-10 shrink-0">
          <a href="index.html" class="flex items-center gap-2 group">
            <span class="text-xl sm:text-2xl font-black logo-brand tracking-widest uppercase text-white transition-colors duration-300">THE AI <span class="text-orange-500">BULLETIN</span></span>
          </a>
          <div class="hidden md:flex items-center gap-8 text-xs font-black uppercase tracking-widest text-neutral-400">
            <a href="index.html" class="hover:text-orange-500 hover:scale-[1.02] active:scale-[0.98] transition-all">Front Page</a>
            <a href="articles.html" class="hover:text-orange-500 hover:scale-[1.02] active:scale-[0.98] transition-all">Archives</a>
          </div>
        </div>
        <form class="search-form flex-1 max-w-md hidden lg:block" action="articles.html" method="GET">
          <div class="relative">
            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 text-neutral-500 w-4 h-4" fill="none"
              stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8" />
              <path d="m21 21-4.35-4.35" />
            </svg>
            <input type="text" name="search" placeholder="Search archives..."
              class="w-full bg-neutral-950/60 border border-neutral-900 focus:border-orange-500/80 focus:ring-1 focus:ring-orange-500 pl-11 pr-4 py-2 text-xs outline-none transition-all text-white placeholder-neutral-500 rounded font-sans">
          </div>
        </form>
        <div class="flex items-center gap-4">
          <div id="nav-auth-links" class="hidden sm:flex items-center gap-4"></div>
          <button id="mobile-menu-btn"
            class="lg:hidden w-10 h-10 flex items-center justify-center text-neutral-400 hover:text-white hover:bg-neutral-900/50 rounded transition-all active:scale-[0.95]">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
        </div>
      </div>
    </div>
    <div id="mobile-menu" class="hidden border-t border-neutral-900 bg-neutral-950/95 backdrop-blur-lg px-4 py-6 space-y-4">
      <form class="search-form relative" action="articles.html" method="GET">
        <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 text-neutral-500 w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" name="search" placeholder="Search..." class="w-full bg-black border border-neutral-900 text-white placeholder-neutral-500 pl-11 pr-4 py-2.5 text-xs outline-none transition-all focus:border-orange-500 rounded font-sans">
      </form>
      <div class="flex flex-col gap-1 font-black uppercase tracking-widest text-xs text-neutral-400">
        <a href="index.html" class="hover:text-orange-500 transition-colors py-2.5 px-2 rounded hover:bg-neutral-900/50">Front Page</a>
        <a href="articles.html" class="hover:text-orange-500 transition-colors py-2.5 px-2 rounded hover:bg-neutral-900/50">Archives</a>
        <div id="mobile-auth-links" class="flex flex-col gap-2 pt-2 border-t border-neutral-900"></div>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">

      <article class="lg:col-span-2 fade-up">
        
        <div id="article-content">
          <div class="flex justify-center py-32">
            <div class="w-12 h-12 border border-gray-800 border-t-black-full animate-spin"></div>
          </div>
        </div>
      </article>

      <aside class="space-y-10 fade-up" style="animation-delay:0.15s">

        <div>
          <div class="border-t border-gray-800 pt-3 mb-5">
            <h3 class="text-sm font-black uppercase tracking-widest text-white">More Reports</h3>
          </div>
          <div id="sidebar-articles" class="space-y-5">
            <div class="animate-pulse space-y-2"><div class="h-4 bg-gray-800 w-full"></div><div class="h-4 bg-gray-800 w-3/4"></div></div>
            <div class="animate-pulse space-y-2"><div class="h-4 bg-gray-800 w-full"></div><div class="h-4 bg-gray-800 w-3/4"></div></div>
            <div class="animate-pulse space-y-2"><div class="h-4 bg-gray-800 w-full"></div><div class="h-4 bg-gray-800 w-3/4"></div></div>
          </div>
        </div>

        <div class="bg-black border border-gray-800 p-6">
          <h3 class="text-sm font-black uppercase tracking-widest text-white mb-2">Daily Brief</h3>
          <p class="text-sm text-gray-400 font-serif mb-4 leading-relaxed">Top stories delivered every morning.</p>
          <form
            onsubmit="event.preventDefault(); showPopup('Subscription Success', 'Thank you! You have been successfully subscribed to The AI Bulletin Daily Brief.', false); this.reset();"
            class="space-y-3">
            <input type="email" placeholder="your@email.com"
              class="w-full bg-neutral-950 border border-neutral-800 text-white placeholder-neutral-500 focus:border-orange-500 focus:ring-1 focus:ring-orange-500 px-4 py-2.5 text-sm outline-none transition-all font-sans rounded"
              required>
            <button
              class="w-full bg-orange-500 text-black hover:bg-orange-600 active:scale-[0.98] text-xs font-bold uppercase tracking-widest py-2.5 transition-all font-sans rounded">Subscribe
              Free</button>
          </form>
        </div>

        <div id="sidebar-tags">
          <div class="border-t border-gray-800 pt-3 mb-5">
            <h3 class="text-sm font-black uppercase tracking-widest text-white">Tags</h3>
          </div>
          <div id="tags-list" class="flex flex-wrap gap-2"></div>
        </div>

      </aside>
    </div>
  </div>

  <section class="border-t border-gray-800 bg-black py-12 mt-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center mb-8">
        <h2 class="text-xl font-serif font-black uppercase tracking-tight">More From The Archives</h2>
        <a href="articles.html" class="text-xs font-bold uppercase tracking-wider text-white hover:underline">All Reports &rarr;</a>
      </div>
      <div id="more-articles" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
        <div class="col-span-full flex justify-center py-8"><div class="w-8 h-8 border-2 border-gray-800 border-t-black-full animate-spin"></div></div>
      </div>
    </div>
  </section>

  <footer class="bg-black text-white pt-8 pb-0 border-t border-gray-900 flex flex-col gap-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col sm:flex-row justify-between items-center gap-4 w-full">
      <span class="text-xl logo-brand text-white">THE AI <span class="text-orange-500">BULLETIN</span></span>
      <div class="flex gap-6 text-sm text-gray-400">
        <a href="index.html" class="hover:text-white">Front Page</a>
        <a href="articles.html" class="hover:text-white">Archives</a>
        <a href="admin-login.html" class="hover:text-white">Admin</a>
      </div>
      <span class="text-xs text-gray-500">&copy; 2026 The AI Bulletin</span>
    </div>

    <div class="relative w-full flex flex-col items-center justify-center bg-black">
      <div class="relative w-full select-none leading-none flex justify-center">
        <svg viewBox="0 0 1200 150" class="w-full max-w-7xl mx-auto h-auto uppercase">
          <text x="50%" y="130" text-anchor="middle" font-size="140" font-family="'Syncopate', sans-serif"
            font-weight="900" fill="none" stroke-width="0.7" textLength="1200" lengthAdjust="spacingAndGlyphs">
            <tspan stroke="#f97316" fill="#f97316">AI </tspan>
            <tspan stroke="#f97316">BULLETIN</tspan>
          </text>
        </svg>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      const slug = urlParams.get('slug');
      const container = document.getElementById('article-content');

      if (!slug) {
        container.innerHTML = '<h1 class="text-4xl font-serif font-black text-center text-white uppercase py-20">Report Not Found</h1>';
        return;
      }

      try {
        
        const [article, allData] = await Promise.all([
          fetchAPI(`/articles/${slug}`),
          fetchAPI('/articles?limit=20')
        ]);

        document.title = (article.metaTitle || article.title) + ' - The AI Bulletin';

        const tagsHtml = (article.tags || [])
          .map(t => `<span class="tag-pill">${t}</span>`).join('');

        container.innerHTML = `
          <div class="mb-6">
            <div class="flex flex-wrap gap-2 mb-5">${tagsHtml || '<span class="tag-pill">News</span>'}</div>

            <h1 class="font-serif font-black text-4xl md:text-5xl xl:text-6xl leading-tight tracking-tight text-white mb-6">
              ${article.title}
            </h1>

            ${article.metaDescription ? `<p class="text-xl font-serif text-gray-500 leading-relaxed mb-6 border-l-4 border-gray-700 pl-4">${article.metaDescription}</p>` : ''}

            <div class="flex flex-wrap items-center gap-5 text-xs font-bold uppercase tracking-widest text-gray-400 border-y-2 border-gray-800 py-4 mb-0">
              <span>${formatDate(article.createdAt)}</span>
              <span class="text-gray-200">|</span>
              <span>${article.readingTime} min read</span>
            </div>
          </div>

          ${article.image ? `
            <div class="mb-10">
              <img src="${article.image}" alt="${article.title}"
                class="w-full max-h-[520px] object-cover border border-gray-800"
                onerror="this.parentElement.remove()">
            </div>
          ` : ''}

          <div class="prose">
            ${article.content}
          </div>

          <div class="mt-12 pt-8 border-t-2 border-gray-800">
            <div class="flex flex-wrap gap-2 mb-6">
              ${(article.tags||[]).map(t=>`<a href="articles.html?search=${encodeURIComponent(t)}" class="tag-pill hover:bg-gray-800 transition-colors">${t}</a>`).join('')}
            </div>
            <a href="articles.html" class="btn-primary inline-flex text-sm">
              &larr; Read More Reports
            </a>
          </div>
        `;

        const others = (allData.articles || []).filter(a => a.slug !== slug);

        document.getElementById('sidebar-articles').innerHTML = others.slice(0, 6).map(a => `
          <a href="article.html?slug=${a.slug}" class="sidebar-card flex gap-3 group">
            ${a.image ? `
              <div class="w-16 h-14 shrink-0 overflow-hidden border border-gray-800">
                <img src="${a.image}" class="w-full h-full object-cover transition-all duration-300" onerror="this.parentElement.remove()">
              </div>` : ''
            }
            <div class="flex-1 min-w-0">
              <h4 class="font-serif font-bold text-sm text-white leading-snug line-clamp-2 group-hover:text-gray-400 transition-colors">${a.title}</h4>
              <p class="text-xs text-gray-400 font-bold uppercase tracking-wider mt-1">${formatDate(a.createdAt)}</p>
            </div>
          </a>
        `).join('<hr class="border-gray-800">');

        const allTags = [...new Set((allData.articles||[]).flatMap(a=>a.tags||[]))].slice(0,10);
        document.getElementById('tags-list').innerHTML = allTags.map(t =>
          `<a href="articles.html?search=${encodeURIComponent(t)}" class="text-xs font-bold uppercase tracking-wider border border-gray-700 px-3 py-1 hover:bg-black hover:text-white hover:border-gray-800 transition-colors">${t}</a>`
        ).join('');

        const moreArticles = others.slice(0, 8);
        document.getElementById('more-articles').innerHTML = moreArticles.map(a => `
          <a href="article.html?slug=${a.slug}" class="block group border border-gray-800 bg-black hover:border-gray-800 transition-colors">
            <div class="h-36 overflow-hidden border-b border-gray-800">
              ${a.image
                ? `<img src="${a.image}" class="w-full h-full object-cover transition-all duration-400" onerror="this.parentElement.style.background='#f3f4f6'">`
                : `<div class="w-full h-full bg-gray-800 flex items-center justify-center text-xs text-gray-400 font-bold uppercase">No Image</div>`
              }
            </div>
            <div class="p-4">
              <span class="tag-pill mb-2 inline-block">${a.tags?.[0]||'News'}</span>
              <h4 class="font-serif font-bold text-sm text-white leading-snug line-clamp-2 group-hover:text-gray-400 transition-colors">${a.title}</h4>
              <p class="text-xs text-gray-400 font-bold uppercase tracking-wider mt-2">${a.readingTime} min &bull; ${formatDate(a.createdAt)}</p>
            </div>
          </a>
        `).join('');

      } catch (err) {
        console.error(err);
        container.innerHTML = `
          <div class="text-center py-20">
            <h1 class="text-4xl font-serif font-black text-white uppercase mb-4">Report Not Found</h1>
            <a href="articles.html" class="btn-primary inline-flex">Browse Archives</a>
          </div>`;
      }
    });
  </script>
</body>
</html>
