<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login - The AI Bulletin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
  theme: {
    extend: {
      colors: {
        gray: {
          950: '#020202',
          900: '#070707',
          850: '#0a0a0a',
          800: '#101010',
          750: '#151515',
          700: '#181818',
          600: '#222222',
          500: '#444444',
          400: '#8c8c8c',
          300: '#c8c8c8',
          200: '#e1e1e1',
          100: '#f5f5f5'
        }
      },
      fontFamily: {
        sans: ['Inter', 'sans-serif'],
        serif: ['Outfit', 'sans-serif']
      }
    }
  }
}
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-gray-100 font-sans antialiased min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full fade-in-up">
    <div class="bg-black border-2 border-gray-800 p-8 shadow-2xl shadow-black">
      <div class="text-center mb-8">
        <div class="mx-auto w-16 h-16 bg-black flex items-center justify-center mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        </div>
        <h2 class="text-3xl font-serif font-black text-white uppercase tracking-tight">Admin Portal</h2>
        <p class="mt-2 text-sm font-bold uppercase tracking-wider text-gray-500">Authorized Personnel Only</p>
      </div>

      <div id="error-msg" class="hidden bg-black border-l-4 border-gray-700 text-gray-400 p-4 mb-6 font-bold text-sm uppercase tracking-wide text-center"></div>
      
      <form id="login-form" class="space-y-6">
        <div>
          <label class="block text-xs font-bold text-gray-300 mb-2 uppercase tracking-wide">Username</label>
          <input type="text" id="username" required class="input-field">
        </div>
        <div>
          <label class="block text-xs font-bold text-gray-300 mb-2 uppercase tracking-wide">Password</label>
          <input type="password" id="password" required class="input-field">
        </div>
        <button type="submit" class="w-full btn-primary py-3 justify-center">Authenticate</button>
      </form>

      <div class="mt-8 text-center border-t border-gray-800 pt-6">
        <a href="index.html" class="text-sm font-bold uppercase tracking-wider text-gray-500 hover:text-white transition-colors">
          &larr; Return to Front Page
        </a>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById('error-msg');
      const btn = e.target.querySelector('button[type="submit"]');
      errorMsg.classList.add('hidden');
      btn.textContent = 'Authenticating...';
      btn.disabled = true;
      
      const payload = {
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      };

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        
        if (!response.ok) throw new Error(data.message || 'Login failed');
        
        localStorage.setItem('adminToken', data.token);
        window.location.href = 'admin.html';
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.remove('hidden');
        btn.textContent = 'Authenticate';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
