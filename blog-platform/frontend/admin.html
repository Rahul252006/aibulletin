<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - The AI Bulletin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
  theme: {
    extend: {
      colors: {
        gray: {
          950: '#020202',
          900: '#070707',
          850: '#0a0a0a',
          800: '#101010',
          750: '#151515',
          700: '#181818',
          600: '#222222',
          500: '#444444',
          400: '#8c8c8c',
          300: '#c8c8c8',
          200: '#e1e1e1',
          100: '#f5f5f5'
        }
      },
      fontFamily: {
        sans: ['Inter', 'sans-serif'],
        serif: ['Outfit', 'sans-serif']
      }
    }
  }
}
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-gray-100 font-sans antialiased pt-16">
  
  <nav class="fixed w-full top-0 left-0 z-50 bg-black/70 backdrop-blur-xl border-b border-neutral-900 shadow-xl shadow-black/40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16 items-center gap-6">
        <div class="flex items-center gap-10 shrink-0">
          <a href="index.html" class="flex items-center gap-2 group">
            <span class="text-xl sm:text-2xl font-black logo-brand tracking-widest uppercase text-white transition-colors duration-300">THE AI <span class="text-orange-500">BULLETIN</span></span>
            <span class="bg-orange-500/10 text-orange-500 text-[9px] uppercase font-black tracking-widest px-2 py-0.5 rounded border border-orange-500/20 self-center">Admin</span>
          </a>
        </div>
        <div class="flex items-center gap-6">
          <a href="admin.html" class="text-xs font-black uppercase tracking-widest text-neutral-400 hover:text-white transition-colors">Dashboard</a>
          <button onclick="logout()" class="text-xs font-black uppercase tracking-widest text-neutral-400 hover:text-white transition-colors">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <div class="min-h-screen py-12 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 fade-in-up">
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 border-b border-gray-800 pb-4 gap-4">
      <h1 class="text-4xl font-serif font-black text-white uppercase tracking-tight">Publisher Dashboard</h1>
      <a href="admin-edit.html" class="btn-primary text-sm">+ New Report</a>
    </div>

    <div class="bg-black border border-gray-800 shadow-sm overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-left text-sm text-gray-300 font-sans">
          <thead class="bg-gray-800 text-white font-bold uppercase tracking-wider text-xs border-b border-gray-700">
            <tr>
              <th class="px-6 py-4">Title</th>
              <th class="px-6 py-4">Status</th>
              <th class="px-6 py-4 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="admin-table-body" class="divide-y divide-gray-200">
            <tr><td colspan="3" class="text-center py-12 text-gray-500 font-serif text-lg">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if (!getToken()) window.location.href = 'admin-login.html';

    const loadArticles = async () => {
      const tbody = document.getElementById('admin-table-body');
      try {
        const articles = await fetchAPI('/articles/admin/all');
        tbody.innerHTML = '';
        if(articles.length === 0) {
          tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-12 text-center text-gray-500 font-serif text-lg">No articles published yet. Click "New Report" to start.</td></tr>';
          return;
        }
        
        articles.forEach(article => {
          tbody.innerHTML += `
            <tr class="hover:bg-black transition-colors">
              <td class="px-6 py-4 font-bold text-white max-w-md truncate">${article.title}</td>
              <td class="px-6 py-4">
                <span class="inline-flex items-center px-2.5 py-0.5 text-xs font-bold uppercase tracking-wider ${article.published ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-yellow-100 text-yellow-800 border border-yellow-200'}">
                  ${article.published ? 'Published' : 'Draft'}
                </span>
              </td>
              <td class="px-6 py-4 text-right font-bold uppercase tracking-wider text-xs">
                <a href="article.html?slug=${article.slug}" target="_blank" class="text-gray-400 hover:text-white transition-colors mr-4">View</a>
                <a href="admin-edit.html?id=${article._id}" class="text-white hover:text-gray-500 transition-colors mr-4">Edit</a>
                <button onclick="deleteArticle('${article._id}')" class="text-white hover:text-gray-500 transition-colors">Delete</button>
              </td>
            </tr>
          `;
        });
      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="3" class="text-center text-white py-8 font-bold">Failed to load</td></tr>';
      }
    };

    window.deleteArticle = async (id) => {
      const confirmed = await showPopup('Delete Report', 'Are you sure you want to permanently delete this report?', true);
      if(confirmed) {
        await fetchAPI(`/articles/${id}`, { method: 'DELETE' });
        loadArticles();
      }
    };

    document.addEventListener('DOMContentLoaded', loadArticles);
  </script>
</body>
</html>
